services:
  - type: web
    name: maui-alert-hub-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    plan: starter
    envVars:
      - key: NWS_USER_AGENT
        value: MauiAlertHub/1.0 (contact@mauialerthub.com)
      - key: DATABASE_URL
        value: sqlite:///./maui_alert_hub.db
      - key: SCRAPE_INTERVAL_MINUTES
        value: 5
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false  # Set this in the Render dashboard to your Vercel frontend URL
